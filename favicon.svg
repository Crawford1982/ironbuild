<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0a12"/>
  <!-- Outer ring - red -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#c0392b" stroke-width="1.5"/>
  <!-- Middle ring - gold -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#c9a227" stroke-width="1"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="5.5" fill="none" stroke="#c0392b" stroke-width="1"/>
  <!-- Arc reactor spokes -->
  <line x1="16" y1="3" x2="16" y2="7" stroke="#c9a227" stroke-width="1"/>
  <line x1="16" y1="25" x2="16" y2="29" stroke="#c9a227" stroke-width="1"/>
  <line x1="3" y1="16" x2="7" y2="16" stroke="#c9a227" stroke-width="1"/>
  <line x1="25" y1="16" x2="29" y2="16" stroke="#c9a227" stroke-width="1"/>
  <!-- Diagonal spokes -->
  <line x1="6.5" y1="6.5" x2="9.3" y2="9.3" stroke="#c0392b" stroke-width="0.8"/>
  <line x1="22.7" y1="22.7" x2="25.5" y2="25.5" stroke="#c0392b" stroke-width="0.8"/>
  <line x1="25.5" y1="6.5" x2="22.7" y2="9.3" stroke="#c0392b" stroke-width="0.8"/>
  <line x1="6.5" y1="25.5" x2="9.3" y2="22.7" stroke="#c0392b" stroke-width="0.8"/>
  <!-- Core glow -->
  <circle cx="16" cy="16" r="3.5" fill="#4080ff" opacity="0.9"/>
  <circle cx="16" cy="16" r="2" fill="#a0c8ff"/>
</svg>
